# Default V3 local-first baseline.
# Use this file when you want the lightest core-only path:
# - local-task as the default provider
# - codex-cli as the default executor
# - OpenClaw shell disabled by default
#
# For Azure DevOps or GitHub examples, see:
# - deploy/config/providers.azure-devops.yaml
# - deploy/config/providers.github.yaml

providers:
  task_pr_ci:
    default_provider: local-task
    local_task:
      family: local-task
      mode: local-file
      repository_path: ${LOCAL_REPO_PATH}
      task_directory: ${LOCAL_TASKS_PATH}
      review_directory: ${LOCAL_REVIEW_PATH}
      base_branch: ${LOCAL_BASE_BRANCH}
      push_enabled: ${LOCAL_PUSH_ENABLED}

  chat:
    family: rocketchat
    mode: disabled
    room: ai-dev
    webhook_url_env: RC_WEBHOOK_URL
    command_token_env: RC_COMMAND_TOKEN

  executor:
    family: codex
    mode: codex-cli
    harness: codex
    backend: codex-cli
    runtime:
      timeout_seconds: 3600

runtime:
  shell:
    enabled: false
  storage:
    kind: sqlite
    path: ~/.openclaw/harness/harness.db
  workspace_root: ~/.openclaw/workspace/harness
  branch_prefix: ai
  owner: harness-bridge
  lock_ttl_seconds: 1800
  dedupe_ttl_seconds: 86400
  audit_retention_days: 30
  terminal_run_retention_days: 30
  cleanup_batch_size: 50

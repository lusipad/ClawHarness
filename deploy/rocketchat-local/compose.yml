services:
  mongodb:
    image: mongodb/mongodb-community-server:8.2-ubi8
    container_name: claw-az-rocketchat-mongodb
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all", "--replSet", "rs0"]
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 12

  mongo-init-replica:
    image: mongodb/mongodb-community-server:8.2-ubi8
    container_name: claw-az-rocketchat-mongo-init
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -lc
      - |
        mongosh --host mongodb:27017 --quiet <<'EOF'
        const config = { _id: "rs0", members: [{ _id: 0, host: "mongodb:27017" }] };
        try {
          rs.initiate(config);
        } catch (error) {
          const message = String(error);
          if (!message.includes("already initialized") && !message.includes("already initiated")) {
            throw error;
          }
        }
        let ready = false;
        for (let i = 0; i < 60; i += 1) {
          try {
            ready = rs.status().ok === 1;
            if (ready) {
              break;
            }
          } catch (error) {
          }
          sleep(1000);
        }
        if (!ready) {
          quit(1);
        }
        EOF

  rocketchat:
    image: rocketchat/rocket.chat:${RC_RELEASE:-8.0.1}
    container_name: claw-az-rocketchat
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init-replica:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      ROOT_URL: ${RC_ROOT_URL:-http://127.0.0.1:3000}
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      INITIAL_USER: "yes"
      ADMIN_USERNAME: ${RC_ADMIN_USERNAME}
      ADMIN_NAME: ${RC_ADMIN_NAME}
      ADMIN_PASS: ${RC_ADMIN_PASS}
      ADMIN_EMAIL: ${RC_ADMIN_EMAIL}
      OVERWRITE_SETTING_Show_Setup_Wizard: completed
      OVERWRITE_SETTING_Site_Url: ${RC_ROOT_URL:-http://127.0.0.1:3000}

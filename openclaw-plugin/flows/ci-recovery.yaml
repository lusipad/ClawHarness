# Draft orchestration outline for CI recovery.
# This file is reference-only and does not carry canonical skill text.

id: ci-recovery
status: draft
purpose: Resume an existing run after CI failure and either patch or escalate.

capability_refs:
  runtime:
    - capability_id: resolve_run_from_ci
    - capability_id: transition_status
  shared:
    - capability_id: ci.get_status
    - capability_id: ci.retry
    - capability_id: executor.run_coding_task
    - capability_id: vcs.commit_and_push
    - capability_id: chat.post_update

skill_refs:
  - skill_id: recover-ci-failure

steps:
  - id: resolve-run
    kind: runtime
    capability_id: resolve_run_from_ci
    outcome: existing run and session identified from ci_run_id

  - id: load-failure
    kind: capability
    capability_id: ci.get_status
    outcome: CI failure summary available to the flow

  - id: decide
    kind: skill
    skill_id: recover-ci-failure
    outcome: patch-or-escalate decision made

  - id: patch
    kind: capability
    capability_id: executor.run_coding_task
    outcome: patch applied when recovery is possible

  - id: publish
    kind: capability
    capability_id: vcs.commit_and_push
    outcome: fix pushed when recovery succeeds

  - id: retry
    kind: capability
    capability_id: ci.retry
    outcome: CI rerun requested when policy allows it

  - id: notify
    kind: capability
    capability_id: chat.post_update
    outcome: patch or escalation status sent

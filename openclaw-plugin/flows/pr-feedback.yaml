# Draft orchestration outline for PR feedback resume.
# This file is reference-only and does not carry canonical skill text.

id: pr-feedback
status: draft
purpose: Resume an existing run after review feedback on the PR.

capability_refs:
  runtime:
    - capability_id: resolve_run_from_pr
    - capability_id: transition_status
  shared:
    - capability_id: pr.list_comments
    - capability_id: executor.run_coding_task
    - capability_id: vcs.commit_and_push
    - capability_id: pr.reply
    - capability_id: chat.post_update

skill_refs:
  - skill_id: fix-pr-feedback

steps:
  - id: resolve-run
    kind: runtime
    capability_id: resolve_run_from_pr
    outcome: existing run and session identified from pr_id

  - id: collect-feedback
    kind: capability
    capability_id: pr.list_comments
    outcome: unresolved review feedback collected

  - id: patch
    kind: skill
    skill_id: fix-pr-feedback
    outcome: patch plan generated for the current diff

  - id: coding
    kind: capability
    capability_id: executor.run_coding_task
    outcome: changes applied in the existing workspace

  - id: publish
    kind: capability
    capability_id: vcs.commit_and_push
    outcome: updated branch pushed

  - id: reply
    kind: capability
    capability_id: pr.reply
    outcome: PR updated with a response summary

  - id: notify
    kind: capability
    capability_id: chat.post_update
    outcome: review-follow-up status sent

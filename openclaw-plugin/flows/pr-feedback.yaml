# Draft flow outline for PR feedback resume.
# Validate against the installed OpenClaw TaskFlow schema before runtime use.

id: pr-feedback
status: draft
purpose: Resume an existing run after review feedback on the PR.

capabilities:
  runtime:
    - resolve_run_from_pr
    - transition_status
  shared:
    - pr.list_comments
    - executor.run_coding_task
    - vcs.commit_and_push
    - pr.reply
    - chat.post_update

skills:
  - fix-pr-feedback

steps:
  - id: resolve-run
    kind: runtime
    uses: resolve_run_from_pr
    outcome: existing run and session identified from pr_id

  - id: collect-feedback
    kind: capability
    uses: pr.list_comments
    outcome: unresolved review feedback collected

  - id: patch
    kind: skill
    uses: fix-pr-feedback
    outcome: patch plan generated for the current diff

  - id: coding
    kind: capability
    uses: executor.run_coding_task
    outcome: changes applied in the existing workspace

  - id: publish
    kind: capability
    uses: vcs.commit_and_push
    outcome: updated branch pushed

  - id: reply
    kind: capability
    uses: pr.reply
    outcome: PR updated with a response summary

  - id: notify
    kind: capability
    uses: chat.post_update
    outcome: review-follow-up status sent

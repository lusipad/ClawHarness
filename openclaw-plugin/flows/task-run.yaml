# Draft orchestration outline for the ClawHarness task workflow.
# This file intentionally stays as a reference-only flow contract:
# - workflow owns stage ordering and references
# - canonical skill text lives under skills/core
# - capability implementations live behind the runtime/plugin registry

id: task-run
status: draft
purpose: Take an eligible task from intake to PR creation and first CI wait.

capability_refs:
  runtime:
    - capability_id: claim_run
    - capability_id: transition_status
    - capability_id: save_audit
  shared:
    - capability_id: task.get
    - capability_id: task.update_status
    - capability_id: repo.prepare_workspace
    - capability_id: executor.run_coding_task
    - capability_id: vcs.commit_and_push
    - capability_id: pr.create
    - capability_id: chat.post_update

skill_refs:
  - skill_id: analyze-task
  - skill_id: implement-task

steps:
  - id: validate-and-claim
    kind: runtime
    capability_id: claim_run
    outcome: active run exists and task lock is held

  - id: load-task
    kind: capability
    capability_id: task.get
    outcome: normalized task payload available to the flow

  - id: planning
    kind: skill
    skill_id: analyze-task
    outcome: structured task plan with risks and impacted modules

  - id: prepare-workspace
    kind: capability
    capability_id: repo.prepare_workspace
    outcome: clean per-run workspace path

  - id: coding
    kind: capability
    capability_id: executor.run_coding_task
    outcome: code changes, changed files, and check summary

  - id: verification-gate
    kind: control
    capability_id: check-gate
    outcome: branch push is blocked unless required checks have run

  - id: publish-branch
    kind: capability
    capability_id: vcs.commit_and_push
    outcome: branch pushed to the remote repository

  - id: open-pr
    kind: capability
    capability_id: pr.create
    outcome: PR id and url recorded in the run

  - id: notify
    kind: capability
    capability_id: chat.post_update
    outcome: lifecycle update sent to Rocket.Chat

  - id: finalize
    kind: runtime
    capability_id: transition_status
    outcome: run moves to awaiting_ci or awaiting_review
